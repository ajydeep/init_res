<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Ajaydeep | Resume</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <!-- Vercel Speed Insights -->
  <script>
    window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/speed-insights/script.js"></script>

  <style>
    :root {
      --text-main: #0f172a;
      --text-sub: #475569;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: #ffffff;
      color: var(--text-main);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .bg {
      position: absolute;
      inset: 0;
      z-index: -1;
    }

    .blob {
      position: absolute;
      width: 420px;
      height: 260px;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.65;
    }

    .blob.blue {
      background: #1768ff;
      top: 55%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .blob.red {
      background: #ff6a6a;
      top: 35%;
      left: 45%;
      transform: translate(-50%, -50%);
    }

    .container {
      text-align: center;
      padding: 20px;
    }

    h1 {
      font-size: clamp(4rem, 6vw, 5rem);
      font-weight: 650;
      margin-bottom: 16px;
      letter-spacing: -0.02em;
    }

    p {
      font-size: 1.1rem;
      color: var(--text-sub);
      margin-bottom: 36px;
    }

    a.button {
      position: relative;
      overflow: hidden;
      display: inline-block;
      padding: 14px 26px;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      color: #ffffff;
      background: #0f172a;
      border-radius: 12px;
      transition: color 0.35s ease, transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    }

    a.button::before {
      content: "";
      position: absolute;
      top: var(--y);
      left: var(--x);
      width: 0;
      height: 0;
      background: #ffffff;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      transition: width 0.5s ease, height 0.5s ease;
      z-index: 0;
    }

    a.button:hover::before {
      width: 400%;
      height: 400%;
    }

    a.button:hover {
      color: #0f172a;
      transform: translateY(-2px);
      box-shadow: 0 14px 40px rgba(0,0,0,0.18);
    }

    a.button span {
      position: relative;
      z-index: 1;
    }
  </style>
</head>

<body>
  <div class="bg">
    <div class="blob blue"></div>
    <div class="blob red"></div>
  </div>

  <div class="container">
    <h1>Ajaydeep</h1>
    <p>Software Engineer · Student</p>
    <a class="button" href="resume.pdf" target="_blank">
      <span>Download Resume</span>
    </a>
  </div>

  <script>
    const button = document.querySelector(".button");

    button.addEventListener("mousemove", (e) => {
      const rect = button.getBoundingClientRect();
      button.style.setProperty("--x", `${e.clientX - rect.left}px`);
      button.style.setProperty("--y", `${e.clientY - rect.top}px`);
    });
  </script>
</body>
</html>
